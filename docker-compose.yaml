# nginx proxy address - http://172.17.0.1:60321

name: yourls
x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

services:
  app:
    image: yourls:latest
    container_name: yourls-app
    hostname: ${BASE_HOST_NAME:-$HOSTNAME}
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: yourls-app
      HOSTNAME: ${BASE_HOST_NAME:-$HOSTNAME}
      YOURLS_DB_USER: ${DB_USER_NAME:-yourls}
      YOURLS_DB_NAME: ${DB_CREATE_DATABASE_NAME:-yourls}
      YOURLS_DB_HOST: yourls-db
      YOURLS_DB_PASS: ${DB_USER_PASS:-changeme_db_password}
      YOURLS_USER: ${APP_ADMIN_USER:-administrator}
      YOURLS_PASS: ${APP_ADMIN_PASS:-changeme_admin_password}
      YOURLS_SITE: https://${BASE_DOMAIN_NAME:-$HOSTNAME}
    ports:
      - '172.17.0.1:60321:80'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - yourls
      - proxy
      - cloudflare
    labels:
      - 'traefik.enable=true'
      - 'cloudflare.enable=true'
      - 'traefik.docker.network=proxy'
      - 'cloudflare.service=http://yourls-app:80'
      - 'cloudflare.hostname=yourls.${CLOUDFLARE_ZONE_NAME:-}'
      - 'traefik.http.routers.yourls-app.entrypoints=http'
      - 'traefik.http.routers.yourls-app-secure.tls=true'
      - 'traefik.http.routers.yourls-app.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.middlewares.yourls-app-https-redirect.redirectscheme.scheme=https'
      - 'traefik.http.routers.yourls-app.middlewares=yourls-app-https-redirect'
      - 'traefik.http.routers.yourls-app-secure.entrypoints=https'
      - 'traefik.http.routers.yourls-app-secure.rule=Host($(${BASE_HOST_NAME:-$HOSTNAME}))'
      - 'traefik.http.routers.yourls-app-secure.tls.certresolver=cloudflare'
      - 'traefik.http.routers.yourls-app-secure.service=yourls-app'
      - 'traefik.http.services.yourls-app.loadbalancer.server.port=80'

  db:
    image: mariadb:latest
    container_name: yourls-db
    hostname: yourls-db
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      CONTAINER_NAME: yourls-db
      MARIADB_ALLOW_EMPTY_PASSWORD: false
      MARIADB_ROOT_PASSWORD: ${DB_ADMIN_PASS:-changeme_admin_password}
      MARIADB_DATABASE: ${DB_CREATE_DATABASE_NAME:-yourls}
      MARIADB_USER: ${DB_USER_NAME:-yourls}
      MARIADB_PASSWORD: ${DB_USER_PASS:-changeme_db_password}
    volumes:
      - './volumes/data/db/mysql:/var/lib/mysql'
    healthcheck:
      test:
        [
          'CMD',
          'healthcheck.sh',
          '--su-mysql',
          '--connect',
          '--innodb_initialized',
        ]
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3
    networks:
      - yourls

networks:
  yourls:
    name: yourls
    external: false
  proxy:
    external: true
  cloudflare:
    external: true
